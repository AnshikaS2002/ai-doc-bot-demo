name: Generate Documentation

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - "app.js"

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm ci

      - name: Run AI Generator
        run: node ai-doc-bot.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai-doc-update-${{ github.run_number }}
          commit-message: "AI: Generate documentation"
          title: "AI Documentation Update"
          body: "Automated documentation suggestion."
          base: main
          add-paths: |
            docs/generated-doc.html
