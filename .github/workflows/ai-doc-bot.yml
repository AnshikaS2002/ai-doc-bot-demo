name: AI Documentation Bot

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "app.js"

jobs:
  update-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run AI Documentation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node ai-doc-bot.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: ai-doc-update-${{ github.run_number }}
          commit-message: "AI: Update documentation via Gemini"
          title: "AI Documentation Update"
          body: "Automated documentation update generated by Gemini."
          base: main
          add-paths:
            - "README.md"
